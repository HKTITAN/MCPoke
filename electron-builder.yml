appId: dev.mcpoke.desktop
productName: MCPoke
directories:
  output: release
files:
  - out/**
  - package.json
asar: true
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
win:
  target:
    - nsis
    - zip
linux:
  target:
    - AppImage
    - deb
    - rpm
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
